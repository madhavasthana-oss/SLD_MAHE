<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ASL · Live Detector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080b10;
      --bg2:       #0d1117;
      --bg3:       #111820;
      --border:    #1e2d3d;
      --accent:    #00e5ff;
      --accent2:   #7b2fff;
      --green:     #00ff88;
      --dim:       #3a5068;
      --text:      #c9d8e8;
      --text-dim:  #4a6580;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Syne', sans-serif;
      --glow:      0 0 18px rgba(0,229,255,0.35);
      --glow2:     0 0 18px rgba(123,47,255,0.35);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow: hidden;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* corner bracket decoration */
    .bracket::before, .bracket::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.6;
    }
    .bracket::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .bracket::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

    /* ── LAYOUT ── */
    #app {
      display: grid;
      grid-template-rows: 48px 1fr;
      grid-template-columns: 1fr 300px;
      grid-template-areas:
        "header header"
        "feed   sidebar";
      height: 100vh;
      gap: 0;
    }

    /* ── HEADER ── */
    header {
      grid-area: header;
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      position: relative;
      z-index: 10;
    }

    .logo {
      font-family: var(--sans);
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .logo span { color: var(--text-dim); font-weight: 400; }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 2px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--dim);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.error { background: #ff4455; box-shadow: 0 0 8px #ff4455; }

    .header-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 16px;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }
    #fps-counter { color: var(--accent); min-width: 56px; }
    #conf-counter { color: var(--accent2); min-width: 50px; }

    /* ── FEED ── */
    #feed-area {
      grid-area: feed;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    video { display: none; }

    /* big predicted letter overlay */
    #big-letter {
      position: absolute;
      bottom: 24px; left: 32px;
      font-family: var(--sans);
      font-weight: 800;
      font-size: 96px;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 2px var(--accent);
      text-shadow: var(--glow);
      letter-spacing: -0.02em;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.12s, transform 0.12s;
      pointer-events: none;
      z-index: 20;
    }
    #big-letter.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* corner scan brackets on feed */
    #feed-area .bracket::before { width: 20px; height: 20px; top: 12px; left: 12px; }
    #feed-area .bracket::after  { width: 20px; height: 20px; bottom: 12px; right: 12px; }

    /* start button */
    #start-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      background: transparent;
      border: 1px solid var(--accent);
      padding: 12px 28px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      z-index: 30;
    }
    #start-btn:hover { background: rgba(0,229,255,0.08); box-shadow: var(--glow); }
    #start-btn.hidden { display: none; }

    /* ── SIDEBAR ── */
    #sidebar {
      grid-area: sidebar;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      background: var(--bg2);
      overflow: hidden;
    }

    .panel-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 12px 16px 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── STATS PANEL ── */
    #stats-panel {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 10px 12px;
      position: relative;
    }
    .stat-box.bracket { }
    .stat-label {
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .stat-val {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 22px;
      color: var(--accent);
      line-height: 1;
    }
    .stat-val.purple { color: var(--accent2); }
    .stat-val.green  { color: var(--green); }

    /* ── CURRENT PREDICTION ── */
    #pred-panel {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    #pred-letter-large {
      font-family: var(--sans);
      font-weight: 800;
      font-size: 56px;
      line-height: 1;
      color: var(--accent);
      text-shadow: var(--glow);
      letter-spacing: -0.02em;
      min-height: 56px;
    }
    #pred-class {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-top: 4px;
    }
    #conf-bar-wrap {
      margin-top: 10px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    #conf-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 2px;
      transition: width 0.15s;
    }

    /* ── TRANSCRIPT ── */
    #transcript-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      font-size: 11px;
      line-height: 1.8;
      color: var(--text-dim);
      word-break: break-all;
    }
    #transcript::-webkit-scrollbar { width: 3px; }
    #transcript::-webkit-scrollbar-thumb { background: var(--border); }

    .t-letter {
      display: inline-block;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 0.15s forwards;
    }
    .t-letter.accent { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── TRANSCRIPT CONTROLS ── */
    #transcript-controls {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
    }

    .ctrl-btn {
      flex: 1;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--border);
      padding: 7px 4px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .ctrl-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* ── API CONFIG ── */
    #api-bar {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #api-url {
      flex: 1;
      font-family: var(--mono);
      font-size: 9px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 8px;
      outline: none;
      letter-spacing: 0.04em;
    }
    #api-url:focus { border-color: var(--accent); }
    #api-label {
      font-size: 8px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    /* interval control */
    #interval-bar {
      padding: 8px 16px 10px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #interval-label { font-size: 9px; color: var(--text-dim); letter-spacing: 0.1em; white-space: nowrap; }
    #interval-val   { font-size: 9px; color: var(--accent); min-width: 32px; text-align: right; }
    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 2px;
      background: var(--border);
      outline: none;
      border-radius: 2px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: var(--glow);
    }

    /* error toast */
    #toast {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #ff4455;
      background: var(--bg2);
      border: 1px solid #ff4455;
      padding: 8px 18px;
      z-index: 999;
      transition: transform 0.2s;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">ASL<span> · </span>Detector</div>
    <div class="status-pill"><div class="dot" id="status-dot"></div><span id="status-text">standby</span></div>
    <div class="header-right">
      <span>FPS <span id="fps-counter">—</span></span>
      <span>CONF <span id="conf-counter">—</span></span>
      <span id="model-tag">YOLO + RESNET-50</span>
    </div>
  </header>

  <!-- FEED -->
  <div id="feed-area" class="bracket">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="big-letter"></div>
    <button id="start-btn">▶ init camera</button>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="panel-label">// prediction</div>

    <!-- stats row -->
    <div id="stats-panel">
      <div class="stat-box bracket">
        <div class="stat-label">Total</div>
        <div class="stat-val" id="stat-total">0</div>
      </div>
      <div class="stat-box bracket">
        <div class="stat-label">Last conf</div>
        <div class="stat-val purple" id="stat-conf">—</div>
      </div>
      <div class="stat-box bracket" style="grid-column:span 2">
        <div class="stat-label">Current letter</div>
        <div id="pred-letter-large">—</div>
        <div id="pred-class">awaiting signal...</div>
        <div id="conf-bar-wrap"><div id="conf-bar"></div></div>
      </div>
    </div>

    <!-- transcript -->
    <div id="transcript-wrap">
      <div class="panel-label">// transcript</div>
      <div id="transcript"><span style="color:var(--text-dim);font-size:10px">_</span></div>
      <div id="transcript-controls">
        <button class="ctrl-btn" onclick="addSpace()">space</button>
        <button class="ctrl-btn" onclick="deleteLast()">delete</button>
        <button class="ctrl-btn" onclick="clearTranscript()">clear</button>
        <button class="ctrl-btn" onclick="copyTranscript()">copy</button>
      </div>
    </div>

    <!-- api url -->
    <div id="api-bar">
      <span id="api-label">API</span>
      <input id="api-url" type="text" value="http://localhost:8000/predict" spellcheck="false"/>
    </div>

    <!-- interval slider -->
    <div id="interval-bar">
      <span id="interval-label">interval</span>
      <input type="range" id="interval-slider" min="100" max="2000" step="100" value="300"
             oninput="updateInterval(this.value)">
      <span id="interval-val">300ms</span>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
  const video    = document.getElementById('video');
  const canvas   = document.getElementById('canvas');
  const ctx      = canvas.getContext('2d');
  const startBtn = document.getElementById('start-btn');
  const bigLetter= document.getElementById('big-letter');

  // state
  let streaming   = false;
  let loopTimer   = null;
  let intervalMs  = 300;
  let totalPreds  = 0;
  let transcript  = [];
  let lastLetter  = null;

  // fps tracking
  let fpsFrames = 0, fpsLast = performance.now();

  // ── CAMERA INIT ──────────────────────────────────────────────
  startBtn.addEventListener('click', async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      await video.play();
      startBtn.classList.add('hidden');
      streaming = true;
      setStatus('live');
      startLoop();
    } catch(e) {
      showToast('camera access denied');
      setStatus('error');
    }
  });

  // ── RESIZE CANVAS TO FEED ─────────────────────────────────────
  function resizeCanvas() {
    const area = document.getElementById('feed-area');
    canvas.width  = area.clientWidth;
    canvas.height = area.clientHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ── MAIN LOOP ─────────────────────────────────────────────────
  function startLoop() {
    if (loopTimer) clearInterval(loopTimer);
    loopTimer = setInterval(captureAndPredict, intervalMs);
  }

  async function captureAndPredict() {
    if (!streaming || video.readyState < 2) return;

    // draw current frame to canvas (scaled)
    const vw = video.videoWidth  || canvas.width;
    const vh = video.videoHeight || canvas.height;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // fps
    fpsFrames++;
    const now = performance.now();
    if (now - fpsLast >= 1000) {
      document.getElementById('fps-counter').textContent = fpsFrames + ' fps';
      fpsFrames = 0; fpsLast = now;
    }

    // get blob and POST
    canvas.toBlob(async (blob) => {
      const fd = new FormData();
      fd.append('file', blob, 'frame.jpg');

      const url = document.getElementById('api-url').value.trim();
      let data;
      try {
        const res = await fetch(url, { method: 'POST', body: fd });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        data = await res.json();
      } catch(e) {
        showToast('api error — check endpoint');
        setStatus('error');
        return;
      }

      setStatus('live');
      handlePrediction(data);

    }, 'image/jpeg', 0.85);
  }

  // ── HANDLE PREDICTION ─────────────────────────────────────────
  // Expected: { letter: "A", confidence: 0.94, bbox: [x, y, w, h] }
  // bbox is in 0-1 normalised coords OR pixel coords — auto-detected
  function handlePrediction(data) {
    const letter = (data.letter || data.predicted_letter || data.class || '?').toUpperCase();
    const conf   = parseFloat(data.confidence || data.conf || 0);
    const bbox   = data.bbox || data.bounding_box || null;

    totalPreds++;
    document.getElementById('stat-total').textContent = totalPreds;
    document.getElementById('stat-conf').textContent  = (conf * 100).toFixed(0) + '%';
    document.getElementById('conf-counter').textContent = (conf * 100).toFixed(0) + '%';

    // update sidebar
    document.getElementById('pred-letter-large').textContent = letter;
    document.getElementById('pred-class').textContent = 'ASL class · frame #' + totalPreds;
    document.getElementById('conf-bar').style.width = (conf * 100) + '%';

    // big overlay letter
    bigLetter.textContent = letter;
    bigLetter.classList.remove('show');
    void bigLetter.offsetWidth; // reflow trick
    bigLetter.classList.add('show');

    // draw bbox on canvas
    if (bbox) drawBBox(bbox, letter, conf);

    // transcript append (only on hold — same letter for 2+ frames)
    if (letter === lastLetter) {
      // append on stable hold
    } else {
      if (conf > 0.5) appendTranscript(letter, conf);
      lastLetter = letter;
    }
  }

  // ── DRAW BOUNDING BOX ─────────────────────────────────────────
  function drawBBox(bbox, letter, conf) {
    let [x, y, w, h] = bbox;

    // normalised → pixel
    if (x <= 1 && y <= 1 && w <= 1 && h <= 1) {
      x *= canvas.width;  y *= canvas.height;
      w *= canvas.width;  h *= canvas.height;
    }

    // scale to canvas if bbox was for original video size
    const scaleX = canvas.width  / (video.videoWidth  || canvas.width);
    const scaleY = canvas.height / (video.videoHeight || canvas.height);
    // only scale if coords look like pixel coords for video size
    if (x > 1 || y > 1) {
      x *= scaleX; y *= scaleY; w *= scaleX; h *= scaleY;
    }

    // glow rect
    ctx.save();
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth   = 1.5;
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur  = 12;
    ctx.strokeRect(x, y, w, h);

    // corner brackets
    const cs = 14;
    ctx.lineWidth = 2.5;
    [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([cx,cy], i) => {
      const sx = (i % 2 === 0) ? 1 : -1;
      const sy = (i < 2) ? 1 : -1;
      ctx.beginPath();
      ctx.moveTo(cx + sx * cs, cy);
      ctx.lineTo(cx, cy);
      ctx.lineTo(cx, cy + sy * cs);
      ctx.stroke();
    });

    // label pill
    const label  = letter + '  ' + (conf * 100).toFixed(0) + '%';
    const fSize  = 12;
    ctx.font     = `500 ${fSize}px 'Share Tech Mono', monospace`;
    const tw     = ctx.measureText(label).width;
    const ph = 20, pw = tw + 16;
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(x, y - ph - 2, pw, ph);
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y - ph - 2, pw, ph);
    ctx.fillStyle = '#00e5ff';
    ctx.fillText(label, x + 8, y - ph + 13);

    ctx.restore();
  }

  // ── TRANSCRIPT ────────────────────────────────────────────────
  function appendTranscript(letter, conf) {
    transcript.push(letter);
    const el = document.createElement('span');
    el.className = 't-letter' + (conf > 0.85 ? ' accent' : '');
    el.textContent = letter;
    const tc = document.getElementById('transcript');
    // clear placeholder
    if (tc.children.length === 1 && tc.children[0].tagName !== 'SPAN') tc.innerHTML = '';
    tc.appendChild(el);
    tc.scrollTop = tc.scrollHeight;
  }

  function addSpace() {
    const tc = document.getElementById('transcript');
    tc.appendChild(document.createTextNode(' '));
    transcript.push(' ');
  }

  function deleteLast() {
    transcript.pop();
    const tc = document.getElementById('transcript');
    if (tc.lastChild) tc.removeChild(tc.lastChild);
  }

  function clearTranscript() {
    transcript = [];
    document.getElementById('transcript').innerHTML =
      '<span style="color:var(--text-dim);font-size:10px">_</span>';
  }

  function copyTranscript() {
    navigator.clipboard.writeText(transcript.join('')).then(() => showToast('copied to clipboard'));
  }

  // ── STATUS ────────────────────────────────────────────────────
  function setStatus(state) {
    const dot  = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    dot.className = 'dot ' + state;
    text.textContent = state === 'live' ? 'live' : state === 'error' ? 'error' : 'standby';
  }

  // ── INTERVAL ─────────────────────────────────────────────────
  function updateInterval(val) {
    intervalMs = parseInt(val);
    document.getElementById('interval-val').textContent = val + 'ms';
    if (streaming) startLoop();
  }

  // ── TOAST ─────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
